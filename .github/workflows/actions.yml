name: Windows Build

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: windows-build-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  SWIFT_VERSION: swift-6.1.2-release
  SWIFT_BUILD: 6.1.2-RELEASE
  PROTOC_VERSION: 35.1
  LLAMA_RELEASE_VERSION: b4846
  LLAMA_VULKAN_URL: https://github.com/fkunn1326/llama.cpp/releases/download/b4846/llama-b4846-bin-win-vulkan-x64.zip

jobs:
  build:
    name: Build installer
    runs-on: windows-2022
    timeout-minutes: 90

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: i686-pc-windows-msvc

      - name: Cache Rust
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/git/db
            ~/.cargo/registry/cache
            ~/.cargo/registry/index
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress

      - name: Install Swift
        run: |
          $installer = Join-Path $env:RUNNER_TEMP "swift-${{ env.SWIFT_BUILD }}-windows10.exe"
          $installLog = Join-Path $env:RUNNER_TEMP "swift-install.log"
          $url = "https://download.swift.org/${{ env.SWIFT_VERSION }}/windows10/swift-${{ env.SWIFT_BUILD }}/swift-${{ env.SWIFT_BUILD }}-windows10.exe"

          Invoke-WebRequest -Uri $url -OutFile $installer
          $arguments = @("/quiet", "/log", $installLog)
          $process = Start-Process -FilePath $installer -ArgumentList $arguments -Wait -PassThru -Verb RunAs
          if ($process.ExitCode -ne 0 -and $process.ExitCode -ne 3010) {
            Get-Content -LiteralPath $installLog -ErrorAction SilentlyContinue
            throw "Swift installer exited with code $($process.ExitCode)"
          }

          foreach ($level in "Machine", "User") {
            [Environment]::GetEnvironmentVariables($level).GetEnumerator() | ForEach-Object {
              $name = [string]$_.Name
              $value = [string]$_.Value
              if ($name -eq "Path") {
                $value = (($env:Path + ";" + $value) -split ";" | Select-Object -Unique) -join ";"
              }
              Set-Item -Path "Env:$name" -Value $value
            }
          }

          $env:Path | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          Get-ChildItem Env: | ForEach-Object {
            "$($_.Name)=$($_.Value)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          }
          "RESOLVED_SWIFT_VERSION=${{ env.SWIFT_VERSION }}" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "RESOLVED_SWIFT_BUILD=${{ env.SWIFT_BUILD }}" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

          swift --version

      - name: Fix Swift SDK modulemap
        run: |
          $swiftVersionDir = $env:RESOLVED_SWIFT_BUILD -replace "-RELEASE$", ""
          $swiftPath = "$env:APPDATA\..\Local\Programs\Swift\Platforms\$swiftVersionDir\Windows.platform\Developer\SDKs\Windows.sdk\usr"
          $modulemapUrl = "https://api.github.com/gists/ef8be2217082302b291f2b8d4178194a"
          $destination = "$swiftPath\share\ucrt.modulemap"
          New-Item -ItemType Directory -Force (Split-Path -Parent $destination) | Out-Null
          $modulemap = Invoke-RestMethod -Uri $modulemapUrl
          $modulemap.files.'ucrt.modulemap'.content | Set-Content -LiteralPath $destination -NoNewline -Encoding utf8

      - name: Install Protoc
        run: |
          $zip = Join-Path $env:RUNNER_TEMP "protoc-${{ env.PROTOC_VERSION }}-win64.zip"
          $destination = Join-Path $env:RUNNER_TEMP "protoc"
          Invoke-WebRequest `
            -Uri "https://github.com/protocolbuffers/protobuf/releases/download/v${{ env.PROTOC_VERSION }}/protoc-${{ env.PROTOC_VERSION }}-win64.zip" `
            -OutFile $zip
          New-Item -Path $destination -ItemType Directory -Force | Out-Null
          Expand-Archive -Path $zip -DestinationPath $destination -Force
          "$destination\bin" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8
          & "$destination\bin\protoc.exe" --version

      - name: Cache external native assets
        id: cache-native-assets
        uses: actions/cache@v6
        with:
          path: |
            llama_vulkan
          key: ${{ runner.os }}-llama-${{ env.LLAMA_RELEASE_VERSION }}-${{ hashFiles('.github/workflows/actions.yml') }}
          restore-keys: |
            ${{ runner.os }}-llama-${{ env.LLAMA_RELEASE_VERSION }}-

      - name: Download external native assets
        if: steps.cache-native-assets.outputs.cache-hit != 'true'
        run: |
          function Download-Extract {
            param(
              [Parameter(Mandatory = $true)][string]$Url,
              [Parameter(Mandatory = $true)][string]$Destination
            )

            $tempZip = Join-Path $env:TEMP ([System.IO.Path]::GetRandomFileName() + ".zip")
            Invoke-WebRequest -Uri $Url -OutFile $tempZip
            New-Item -Path $Destination -ItemType Directory -Force | Out-Null
            Expand-Archive -Path $tempZip -DestinationPath $Destination -Force
            Remove-Item $tempZip -Force
          }

          Download-Extract -Url "${{ env.LLAMA_VULKAN_URL }}" -Destination "llama_vulkan"

      - name: Prepare Swift native library
        run: Copy-Item "llama_vulkan\llama.lib" -Destination "server-swift\" -Force

      - name: Check formatting
        run: cargo xtask fmt --check

      - name: Test Rust UI and candidate behavior
        run: |
          cargo test -p shared --lib
          cargo test -p azookey-ui --lib
          cargo test -p azookey-windows --lib delayed_candidate_window

      - name: Build release installer
        run: cargo xtask build --release

      - name: Write installer checksum
        run: |
          $hash = Get-FileHash -Algorithm SHA256 -LiteralPath "build\azookey-setup.exe"
          "$($hash.Hash.ToLowerInvariant())  azookey-setup.exe" | Set-Content -LiteralPath "build\azookey-setup.exe.sha256" -NoNewline -Encoding ascii

      - name: Upload installer artifact
        uses: actions/upload-artifact@v7
        with:
          name: azookey-setup
          path: |
            build/azookey-setup.exe
            build/azookey-setup.exe.sha256
          if-no-files-found: error
          retention-days: 14
